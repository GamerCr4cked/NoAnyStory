<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4D6;</text></svg>">
</head>
<body>
  <div class="site-wrapper">
    <div class="top-bar">
      <a href="{{ '/' | relative_url }}" class="site-logo">NoAnyStory</a>
    </div>

    <div class="content-area">
      {{ content }}
    </div>

    <div class="site-footer">
      <em>NoAnyStory — scripted stories, real feelings.</em>
    </div>
  </div>
</body>
</html>
