<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Chat Viewer</title>
<style>
html, body { margin: 0; padding: 0; background: #36393e; color: #dcddde; font-family: "gg sans", "Helvetica Neue", Helvetica, Arial, sans-serif; font-size: 17px; height: 100%; }
#loading { display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 1.2rem; color: #72767d; }
#container { display: none; }
.chunk-placeholder { min-height: 50px; }
</style>
</head>
<body>
<div id="loading">Loading chat...</div>
<div id="container"></div>
<script>
(async () => {
  const src = 'Direct Messages - FUN ZONE [1337805396282441841].html';
  const res = await fetch(src);
  const html = await res.text();

  // Extract style
  const styleMatch = html.match(/<style>([\s\S]*?)<\/style>/);
  if (styleMatch) {
    const s = document.createElement('style');
    s.textContent = styleMatch[1];
    document.head.appendChild(s);
  }

  // Extract body content (everything between preamble and postamble, including them)
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const allGroups = doc.querySelectorAll('.chatlog__message-group');
  const preamble = doc.querySelector('.preamble');
  const postamble = doc.querySelector('.postamble');

  const container = document.getElementById('container');
  document.getElementById('loading').style.display = 'none';
  container.style.display = 'block';

  // Add preamble
  if (preamble) container.appendChild(preamble.cloneNode(true));

  // Create chatlog wrapper
  const chatlog = document.createElement('div');
  chatlog.className = 'chatlog';
  container.appendChild(chatlog);

  // Chunk size - render N groups at a time
  const CHUNK = 50;
  const chunks = [];
  for (let i = 0; i < allGroups.length; i += CHUNK) {
    const chunk = [];
    for (let j = i; j < Math.min(i + CHUNK, allGroups.length); j++) {
      chunk.push(allGroups[j]);
    }
    chunks.push(chunk);
  }

  // Create placeholder divs for each chunk
  const placeholders = [];
  chunks.forEach((_, idx) => {
    const ph = document.createElement('div');
    ph.className = 'chunk-placeholder';
    ph.dataset.idx = idx;
    ph.style.minHeight = '500px';
    chatlog.appendChild(ph);
    placeholders.push(ph);
  });

  const loaded = new Set();

  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      const idx = parseInt(entry.target.dataset.idx);
      if (entry.isIntersecting && !loaded.has(idx)) {
        // Load this chunk
        loaded.add(idx);
        const ph = placeholders[idx];
        const frag = document.createDocumentFragment();
        chunks[idx].forEach(g => frag.appendChild(g.cloneNode(true)));
        ph.innerHTML = '';
        ph.style.minHeight = '';
        ph.appendChild(frag);

        // Also preload neighbors
        [idx - 1, idx + 1, idx + 2].forEach(n => {
          if (n >= 0 && n < chunks.length && !loaded.has(n)) {
            loaded.add(n);
            const nph = placeholders[n];
            const nfrag = document.createDocumentFragment();
            chunks[n].forEach(g => nfrag.appendChild(g.cloneNode(true)));
            nph.innerHTML = '';
            nph.style.minHeight = '';
            nph.appendChild(nfrag);
          }
        });
      }

      // Unload chunks far from viewport
      if (!entry.isIntersecting && loaded.has(idx)) {
        const rect = entry.target.getBoundingClientRect();
        const dist = Math.abs(rect.top) > window.innerHeight * 5;
        if (dist) {
          const ph = placeholders[idx];
          const h = ph.offsetHeight;
          ph.innerHTML = '';
          ph.style.minHeight = h + 'px';
          loaded.delete(idx);
        }
      }
    });
  }, { rootMargin: '1000px 0px' });

  placeholders.forEach(ph => observer.observe(ph));

  // Add postamble
  if (postamble) container.appendChild(postamble.cloneNode(true));

  // SVG defs (icons)
  const svgDefs = doc.querySelector('svg');
  if (svgDefs) document.body.appendChild(svgDefs.cloneNode(true));
})();
</script>
</body>
</html>
