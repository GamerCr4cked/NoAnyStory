<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1F4D6;</text></svg>">
  <script>
    // Restore theme before render to prevent flash
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
  </script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌙</button>
  <div class="site-wrapper">
    <header class="site-header">
      <div class="header-brand">
        <a href="{{ '/' | relative_url }}" class="brand-link" id="brandLink">UnsaidPages</a>
        <div class="header-dropdown" id="headerDropdown">
          <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active-page"{% endif %}>Home</a>
          <a href="{{ '/stories' | relative_url }}" {% if page.url == '/stories.html' or page.url == '/stories/' %}class="active-page"{% endif %}>Stories</a>
          <a href="{{ '/coming-soon' | relative_url }}" {% if page.url == '/coming-soon.html' or page.url == '/coming-soon/' %}class="active-page"{% endif %}>Coming Soon</a>
        </div>
      </div>
    </header>

    <div class="content-area">
      {{ content }}
    </div>

    <div class="site-footer">
      <em>UnsaidPages — stories that were felt, not just written.</em>
    </div>
  </div>

  <script>
    // Toggle dropdown on click too
    const brandLink = document.getElementById('brandLink');
    const dropdown = document.getElementById('headerDropdown');
    brandLink.addEventListener('click', function(e) {
      if (dropdown.classList.contains('open')) {
        dropdown.classList.remove('open');
      } else {
        e.preventDefault();
        dropdown.classList.add('open');
      }
    });
    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (!e.target.closest('.header-brand')) {
        dropdown.classList.remove('open');
      }
    });

    // ---- Theme Toggle ----
    const themeToggle = document.getElementById('themeToggle');
    function updateToggleIcon() {
      themeToggle.textContent = document.documentElement.getAttribute('data-theme') === 'light' ? '☀️' : '🌙';
    }
    updateToggleIcon();
    themeToggle.addEventListener('click', function() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      if (next === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        localStorage.removeItem('theme');
      } else {
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      }
      updateToggleIcon();
    });
  </script>
</body>
</html>
